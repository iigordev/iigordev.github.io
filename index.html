<!DOCTYPE HTML>
<html lang="en">
<head>

    <link rel="stylesheet" href="styles.css">
    <title>igor's industries</title>

<body>

<div class="border-card">

        <img src="/resources/profile.png" alt="Profile">
    </div>

    <section>
        <div class="text-bubble" title="This bubble shows my activity status, and what I'm thinking of. Can be updated anytime.">
            <p class="bubble-text">...</p>
        </div>
        <div class="bubble1"></div>
        <div class="bubble2"></div>
    </section>

    <div class="profile-body">
        <p class="name">iigordev</p>
        <section>
        <div class="badges-container">
            <img class="badges" src="resources/badges/IG.png" title="@igorcasar2148">
            <img class="badges" src="resources/badges/igortech-logo.png" title="Owner of Igor's Industries">
            <img class="badges" src="resources/badges/steam.png" title="iiigordev [ig0rd3v]">
            <img class="badges" src="resources/badges/YT.png" title="@iigordev">
            <img class="badges" src="resources/badges/roblox.png" title="@Profer199 [iiigordev]">

        </div>
        </section>
        <hr>
        <p class="card-titles">ABOUT ME</p>
        <p class="card-text"> Hello! I'm Igor. I'm a beginner developer learning HTML, CSS & JavaScript.</p>
        <p class="card-titles">SOME STUFF I'M WORKING ON:</p>
        <p class="card-text">Currently, I'm not working on much stuff. I'm learning JavaScript right now, to build one of my sites for my projects. Here's my <a href="https://github.com/iigordev" target="_blank">GitHub</a>.</p>
        <p class="card-titles" id="activity-title">WHAT I'M WORKING ON:</p>
        <div class="activity-box">
            <img class="activity-image">
            
            <div class="activity-info">
                <div id="activity-name" class="act-name"></div>
                <div id="activity-details" class="details"></div>
                <div id="activity-state" class="state"></div>
                <div id="activity-time" class="time"></div>
            </div>
        </div>
    </div>

</div>
</div>
<script src="index.js"></script>
</body>
</html>
